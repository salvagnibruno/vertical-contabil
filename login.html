<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Gestão Pública | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003a70;
            --secondary-blue: #009fe3;
            --accent-orange: #f37021;
            --bg-light: #f4f7fa;
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #001f3f 0%, #003a70 50%, #005eb8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo img {
            width: 80px;
            height: auto;
        }
        .login-logo h1 {
            font-size: 1.3rem;
            color: var(--primary-blue);
            font-weight: 700;
            margin-top: 12px;
        }
        .login-logo p {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-blue);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e7ef;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--secondary-blue);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            background: #ffeaea;
            color: var(--danger);
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .footer-note {
            text-align: center;
            font-size: 0.72rem;
            color: #aaa;
            margin-top: 28px;
        }

        /* Modal Troca de Senha */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25);
        }
        .modal-box h2 {
            font-size: 1.1rem;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }
        .modal-box p {
            font-size: 0.82rem;
            color: #6c757d;
            margin-bottom: 24px;
        }
        .modal-box .btn-login { margin-top: 8px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="logo_delta.png" alt="Delta Logo" onerror="this.style.display='none'">
            <h1>Delta Gestão Pública</h1>
            <p>Sistema de Monitoramento Contábil</p>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <form id="form-login">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="login-email" required placeholder="seu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p class="footer-note">&copy; 2026 Delta Gestão Pública. Acesso restrito.</p>
    </div>

    <!-- Modal: Troca de senha obrigatória -->
    <div id="modal-change-password" class="modal-overlay">
        <div class="modal-box">
            <h2>Troca de Senha Obrigatória</h2>
            <p>Por segurança, você precisa definir uma nova senha antes de continuar.</p>
            <div id="change-pw-error" class="error-msg"></div>
            <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" minlength="6">
            </div>
            <div class="form-group">
                <label>Confirmar Nova Senha</label>
                <input type="password" id="confirm-password" placeholder="Repita a senha">
            </div>
            <button class="btn-login" onclick="submitPasswordChange()">Salvar Nova Senha</button>
        </div>
    </div>

    <script>
        // =========================================================
        // AUTH HELPERS
        // =========================================================
        function hashPassword(email, password) {
            return btoa(unescape(encodeURIComponent(email.toLowerCase().trim() + ':' + password)));
        }

        function getUsers() {
            return JSON.parse(localStorage.getItem('delta_auth_users') || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem('delta_auth_users', JSON.stringify(users));
        }

        function seedAdminIfNeeded() {
            const users = getUsers();
            if (users.length === 0) {
                const admin = {
                    id: 'u_' + Date.now(),
                    email: 'bruno.ramos@deltainf.com.br',
                    passwordHash: hashPassword('bruno.ramos@deltainf.com.br', '123'),
                    role: 'admin',
                    name: 'Bruno Ramos',
                    mustChangePassword: true,
                    createdAt: new Date().toISOString()
                };
                saveUsers([admin]);
            }
        }

        // =========================================================
        // LOGIN FORM
        // =========================================================
        let pendingUserId = null;

        document.getElementById('form-login').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;

            const users = getUsers();
            const hash = hashPassword(email, password);
            const user = users.find(u => u.email.toLowerCase() === email && u.passwordHash === hash);

            if (!user) {
                showError('error-msg', 'E-mail ou senha incorretos.');
                return;
            }

            if (user.mustChangePassword) {
                pendingUserId = user.id;
                document.getElementById('modal-change-password').classList.add('active');
                return;
            }

            createSessionAndRedirect(user);
        });

        function createSessionAndRedirect(user) {
            const session = {
                userId: user.id,
                email: user.email,
                role: user.role,
                name: user.name
            };
            sessionStorage.setItem('delta_session', JSON.stringify(session));
            window.location.href = 'index_dashboard.html';
        }

        function submitPasswordChange() {
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;

            if (newPw.length < 6) {
                showError('change-pw-error', 'A senha deve ter pelo menos 6 caracteres.');
                return;
            }
            if (newPw !== confirmPw) {
                showError('change-pw-error', 'As senhas não coincidem.');
                return;
            }

            const users = getUsers();
            const user = users.find(u => u.id === pendingUserId);
            if (!user) return;

            user.passwordHash = hashPassword(user.email, newPw);
            user.mustChangePassword = false;
            saveUsers(users);

            document.getElementById('modal-change-password').classList.remove('active');
            createSessionAndRedirect(user);
        }

        function showError(elementId, msg) {
            const el = document.getElementById(elementId);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // Init
        seedAdminIfNeeded();

        // Se já estiver logado, redirecionar direto
        const existingSession = sessionStorage.getItem('delta_session');
        if (existingSession) {
            window.location.href = 'index_dashboard.html';
        }
    </script>
</body>
</html>
